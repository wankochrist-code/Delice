<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Délices du Coin - Redirection</title>
    <meta http-equiv="refresh" content="0; url=https://pastel-delice-coin-go.base44.app">
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            text-align: center;
        }
        .container {
            padding: 20px;
        }
        a {
            color: #ffd700;
            text-decoration: none;
            font-weight: bold;
        }
        .loader {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #ffd700;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🍽️ Délices du Coin</h1>
        <div class="loader"></div>
        <p>Redirection en cours vers le site...</p>
        <p>Si la redirection ne fonctionne pas, <a href="https://pastel-delice-coin-go.base44.app">cliquez ici</a></p>
    </div>
</body>
</html>
